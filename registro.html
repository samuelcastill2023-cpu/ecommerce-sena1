<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecommerce - Registro</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="img/logo.png" alt="Logo de Ecommerce">
      <h1>Ecommerce</h1>
    </div>
  </header>

  <main class="contenedor">
    <div class="formulario">
      <h2>Registro</h2>

      <form id="formRegistro" onsubmit="registrarUsuario(event)">
        <label>Nombres</label>
        <input type="text" id="nombreRegistro" required>

        <label>Apellidos</label>
        <input type="text" id="apellidosRegistro" required>

        <label>Dirección</label>
        <input type="text" id="direccionRegistro" required>

        <label>País</label>
        <input type="text" id="paisRegistro" required>

        <label>Fecha de nacimiento</label>
        <input type="date" id="fechaNacimientoRegistro" required>

        <label>Código postal</label>
        <input type="text" id="codigoPostalRegistro" required>

        <label>Correo electrónico</label>
        <input type="email" id="emailRegistro" required>

        <label>Contraseña</label>
        <input type="password" id="passwordRegistro" required>

        <label>Confirmar contraseña</label>
        <input type="password" id="confirmarPasswordRegistro" required>

        <button type="submit">Registrarme</button>
      </form>

      <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a></p>
    </div>
  </main>

<script src="js/register.js"></script>
</body>
</html>
