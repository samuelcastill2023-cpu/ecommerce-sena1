<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecommerce - Iniciar Sesión</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
<header>
  <div class="logo-container">
    <img src="img/logo.png" alt="Logo de Ecommerce">
    <h1>Ecommerce</h1>
  </div>
</header>


  <main class="contenedor">
    <div class="formulario">
      <h2>Iniciar Sesión</h2>
      <form onsubmit="iniciarSesion(event)">
        <label>Correo electrónico</label>
        <input type="email" id="emailLogin" required>

        <label>Contraseña</label>
        <input type="password" id="passwordLogin" required>

        <button type="submit">Ingresar</button>
      </form>
      <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
    </div>
    <div class="forgot-password">
    <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
</div>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
